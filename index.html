<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>残缺的棋盘 - 交互式谜题</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <div class="container">
        <header>
            <h1>3. 问题表征的影响</h1>
        </header>

        <main>
            <section class="puzzle-description">
                <p>一张国际象棋的棋盘，去掉对角线上的两格之后，你能否用整数个小矩形块（其面积为棋盘两个格子的大小），恰好覆盖残缺的棋盘？</p>
                <p class="rule">提示：不允许折断，也不允许重叠。</p>
            </section>

            <div class="puzzle-wrapper">
                <div id="board" class="chessboard">
                    <!-- The 8x8 grid will be generated via JavaScript -->
                </div>

                <div class="controls">
                    <div class="stat-card">
                        <span class="label">当前多米诺数:</span>
                        <span id="domino-count" class="value">0</span>
                    </div>
                    <button id="reset-btn" class="glass-btn">重置棋盘</button>
                </div>
            </div>

            <!-- 思路提醒方块 -->
            <div id="hint-sidebar" class="hint-sidebar collapsed">
                <button id="hint-toggle" class="hint-toggle-btn">
                    <span class="icon">💡</span>
                    <span class="text">思路提醒</span>
                </button>
                <div class="hint-content">
                    <h3>💡 思路提醒</h3>
                    <div id="hint-questions" class="hint-questions">
                        <!-- 问题将通过 JS 动态插入 -->
                    </div>
                    <button id="next-hint-btn" class="glass-btn primary small">
                        点击出现下一问
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>交互式演示 · 探索问题解决的艺术</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
